<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Gestão</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="Publico/css/Estilos.css">
</head>

<body>

    <header>
        <!--
      <div class="logo">P-G</div>

   

    <div class="header-icons">
        <i class="fa-solid fa-calendar"></i>
        <i class="fa-solid fa-calculator"></i>
        <i class="fa-solid fa-bell"></i>

        <div class="profile">
            <img src="https://i.pravatar.cc/40" alt="">
        </div>

        <div class="menu-toggle">
           <i class="fa-solid fa-bars"></i>
        </div>
    </div>
    -->
        <a href="#" class="logo">P-G</a>
        <div class="elementos-header">
            <div class="search-box">
                <input type="search" placeholder="Pesquisar...">
                <i class=" btn-search fa-solid fa-magnifying-glass"></i>

            </div>
            <div class="header-icons">
                <i class="fa-solid fa-calendar"></i>
                <i class="fa-solid fa-bell"></i>

                <div class="profile">
                    <img src="https://i.pravatar.cc/40" alt="">
                </div>

                <div class="menu-toggle">
                    <i class="fa-solid fa-bars"></i>
                </div>
            </div>
        </div>
    </header>

    <div class="container">

        <nav id="navbar">
            <h3></h3>

            <a href="#"><i class="fa-solid fa-house"></i><span> Inicio</span></a>
            <a href="#"><i class="fa-solid fa-chart-line"></i><span> Finanças</span></a>
            <a href="#"><i class="fa-solid fa-building"></i><span> Empresas</span></a>
            <a href="#"><i class="fa-solid fa-users"></i><span> Usuários</span></a>
            <a href="#"><i class="fa-solid fa-gear"></i><span> Configurações</span></a>
            <a href="#"><i class="fa-solid fa-right-from-bracket"></i><span> Sair</span></a>
        </nav>

        <main>
            <div class="cards">

                <div class="card u">
                    <h4>Usuários</h4>
                    <span id="usuarios">0</span>
                    <i class="fa-solid fa-users"></i>
                </div>

                <div class="card g">
                    <h4>Gestores</h4>
                    <span id="gestores">0</span>
                    <i class="fa-solid fa-user-tie"></i>
                </div>

                <div class="card f">
                    <h4>Finanças</h4>
                    <span id="financas">0 kz</span>
                    <i class="fa-solid fa-chart-column"></i>
                </div>

                <div class="card e">
                    <h4>Empresas</h4>
                    <span id="empresas">0</span>
                    <i class="fa-solid fa-building"></i>
                </div>

            </div>

            <div class="elementos-main">
                <div class="alertas">
                    <div class="cabeca-alerta">
                        <h2>Alertas</h2>
                        <i class="btn-alertas fa-solid fa-ellipsis-vertical"></i>
                        <div class="menu-alerta">
                            <a href="#"><i class="fa-solid fa-clock-rotate-left"></i> <span>historico</span></a>
                            <a href="#"><i class="fa-solid fa-trash"></i> <span>clean</span></a>
                        </div>
                    </div>


                    <div class="alertas-grid">

                    </div>
                </div>
                <div class="grafico"><img src="Publico/Img/Grafico.PNG" alt=""></div>
            </div>



        </main>

    </div>

    <footer>
        © <span id="ano"></span> | Todos os Direitos Reservados
    </footer>

    <script src="Publico/Script/code.js"></script>
</body>

</html>
